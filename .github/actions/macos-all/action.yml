name: "macos-all"

runs:
  using: composite
  steps:
    - name: Code checkout
      uses: actions/checkout@v5

    - name: Install dependencies
      shell: bash
      run: |
        mkdir -p $GITHUB_WORKSPACE/static_x64/lib
        mkdir -p $GITHUB_WORKSPACE/dynamic_x64/lib
        mkdir -p $GITHUB_WORKSPACE/static_arm64/lib
        mkdir -p $GITHUB_WORKSPACE/dynamic_arm64/lib

    - name: Install vcpkg
      shell: bash
      run: |
        git clone https://github.com/microsoft/vcpkg builder
        ./builder/bootstrap-vcpkg.sh

    - name: Build libraw
      shell: bash
      run: |
        ./builder/vcpkg install "libraw:x64-osx"
        ./builder/vcpkg install "libraw:x64-osx-dynamic"

        ./builder/vcpkg install "libraw:arm64-osx"
        ./builder/vcpkg install "libraw:arm64-osx-dynamic"

    - name: Prepare dependencies
      shell: bash
      run: |
        cp -r $GITHUB_WORKSPACE/builder/installed/x64-osx/include/libraw $GITHUB_WORKSPACE/static_x64/include
        cp $GITHUB_WORKSPACE/builder/installed/x64-osx/lib/*.a $GITHUB_WORKSPACE/static_x64/lib
        cp $GITHUB_WORKSPACE/builder/installed/x64-osx/lib/manual-link/*.a $GITHUB_WORKSPACE/static_x64/lib

        cp -r $GITHUB_WORKSPACE/builder/installed/arm64-osx/include/libraw $GITHUB_WORKSPACE/static_arm64/include
        cp $GITHUB_WORKSPACE/builder/installed/arm64-osx/lib/*.a $GITHUB_WORKSPACE/static_arm64/lib
        cp $GITHUB_WORKSPACE/builder/installed/arm64-osx/lib/manual-link/*.a $GITHUB_WORKSPACE/static_arm64/lib

        cp -r $GITHUB_WORKSPACE/builder/installed/x64-osx-dynamic/include/libraw $GITHUB_WORKSPACE/dynamic_x64/include
        find $GITHUB_WORKSPACE/builder/installed/x64-osx-dynamic/lib \
          $GITHUB_WORKSPACE/builder/installed/x64-osx-dynamic/lib/manual-link \
          -maxdepth 1 -type f -name "*.dylib" \
          -exec cp {} $GITHUB_WORKSPACE/dynamic_x64/lib \;
        for f in $GITHUB_WORKSPACE/dynamic_x64/lib/*.dylib; \
          do new=$(echo "$f" | sed -E 's/\.[0-9]+(\.[0-9]+)*\.dylib$/.dylib/'); mv "$f" "$new"; done

        cp -r $GITHUB_WORKSPACE/builder/installed/arm64-osx-dynamic/include/libraw $GITHUB_WORKSPACE/dynamic_arm64/include
        find $GITHUB_WORKSPACE/builder/installed/arm64-osx-dynamic/lib \
          $GITHUB_WORKSPACE/builder/installed/arm64-osx-dynamic/lib/manual-link \
          -maxdepth 1 -type f -name "*.dylib" \
          -exec cp {} $GITHUB_WORKSPACE/dynamic_arm64/lib \;
        for f in $GITHUB_WORKSPACE/dynamic_arm64/lib/*.dylib; \
          do new=$(echo "$f" | sed -E 's/\.[0-9]+(\.[0-9]+)*\.dylib$/.dylib/'); mv "$f" "$new"; done

    - name: Zip local
      shell: bash
      run: |
        cd $GITHUB_WORKSPACE/static_x64
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/static_osx_x64.zip include lib

        cd $GITHUB_WORKSPACE/static_arm64
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/static_osx_arm64.zip include lib

        cd $GITHUB_WORKSPACE/dynamic_x64
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/dynamic_osx_x64.zip include lib

        cd $GITHUB_WORKSPACE/dynamic_arm64
        7z a -tzip -mx=9 $GITHUB_WORKSPACE/dynamic_osx_arm64.zip include lib

    - name: Save artifacts
      uses: actions/upload-artifact@v5
      with:
        name: binaries-darwin
        path: "*.zip"
