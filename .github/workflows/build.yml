name: build

on:
  push:
    tags:
      - "*"

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel macOS runners are scarce, so x64 is cross-compiled on the arm64
          # runner via the x64-osx vcpkg triplet.
          - arch: x64
            triplet: x64-osx
            deployment: "10.15"
          - arch: arm64
            triplet: arm64-osx
            deployment: "11.0"
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Create macOS binaries
        uses: ./.github/actions/macos
        with:
          arch: ${{ matrix.arch }}
          triplet: ${{ matrix.triplet }}

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x64
            triplet: x64-linux
          - runner: ubuntu-24.04-arm
            arch: arm64
            triplet: arm64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Create Linux binaries
        uses: ./.github/actions/linux
        with:
          arch: ${{ matrix.arch }}
          triplet: ${{ matrix.triplet }}

  build-mingw:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
            msystem: MINGW64
            triplet-prefix: x64-mingw
            packages: |
              mingw-w64-x86_64-gcc
              mingw-w64-x86_64-cmake
              mingw-w64-x86_64-make
          - runner: windows-11-arm
            arch: arm64
            msystem: CLANGARM64
            triplet-prefix: arm64-mingw
            packages: |
              mingw-w64-clang-aarch64-gcc-compat
              mingw-w64-clang-aarch64-make
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Create MinGW binaries
        uses: ./.github/actions/mingw
        with:
          arch: ${{ matrix.arch }}
          msystem: ${{ matrix.msystem }}
          packages: ${{ matrix.packages }}
          triplet-prefix: ${{ matrix.triplet-prefix }}

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
            triplet-prefix: x64-windows
          - runner: windows-11-arm
            arch: arm64
            triplet-prefix: arm64-windows
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Create Windows binaries
        uses: ./.github/actions/windows
        with:
          arch: ${{ matrix.arch }}
          triplet-prefix: ${{ matrix.triplet-prefix }}

  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-mingw, build-windows]
    permissions:
      contents: write
    steps:
      # The `fetch-depth: 0` is important to fetch all the tags
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch artifact
        uses: actions/download-artifact@v5
        with:
          path: binaries
          merge-multiple: true

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          body: "New release"
          replacesArtifacts: true
          artifacts: binaries/*.zip
